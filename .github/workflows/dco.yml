name: dco

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify every commit is signed off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          missing=0
          for sha in $(git rev-list --no-merges "$BASE_SHA..$HEAD_SHA"); do
            if ! git show -s --format='%B' "$sha" | grep -qE '^Signed-off-by: .+ <.+>'; then
              echo "::error::commit $sha is missing a Signed-off-by line (DCO)"
              git show -s --format='  %h %s' "$sha"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Sign off with 'git commit -s' (amend with 'git commit --amend -s', or 'git rebase --signoff' for several commits)."
            echo "See CONTRIBUTING.md (Developer Certificate of Origin)."
            exit 1
          fi
          echo "All commits are signed off."
