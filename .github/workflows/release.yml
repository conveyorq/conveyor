name: release

# Publishes the conveyor container image to the GitHub Container Registry. Each
# build produces a single multi-arch image (amd64 + arm64). A multi-arch image
# is an index that references one manifest per architecture, so GHCR always
# lists those per-arch manifests as untagged versions next to the tag:
#   - every push to main  -> :<short-sha>   (a single tag: the 7-char commit)
#   - every v* tag         -> :X.Y.Z         (the release version, nothing else)
# No SBOM/provenance attestations are attached (each would add another untagged
# manifest); the originating commit is still recorded as the OCI
# org.opencontainers.image.revision label.
#
# On every v* tag it also packages and pushes the Helm chart as an OCI artifact
#   - oci://ghcr.io/conveyorq/charts/conveyor:X.Y.Z
# with the chart version and appVersion pinned to the tag and signed with
# cosign (keyless). Branch pushes do not publish a chart.

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  id-token: write # cosign keyless signing

env:
  IMAGE: ghcr.io/conveyorq/conveyor
  # Helm charts publish under a separate OCI namespace so the chart repository
  # (charts/conveyor) never collides with the image repository (conveyor).
  CHART_REPO: ghcr.io/conveyorq/charts

# Coalesce rapid pushes to the same ref (e.g. successive pushes to main); each
# tag is its own ref, so tag publishes never cancel one another.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate image publishing on the contents of the image. A push to main only
  # rebuilds the :<sha> image when something that actually ends up inside it
  # changed — Go sources, dependencies, the embedded dashboard, or the
  # Dockerfile. Docs, examples, the Python/TypeScript SDKs, Helm charts, and
  # other tooling never alter the binary, so they skip the build entirely.
  # Version tags ignore this filter and always publish (see `publish`).
  changes:
    name: Changes Detection
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.filter.outputs.image }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            image:
              - 'cmd/**'
              - 'internal/**'
              - 'server/**'
              - 'embedded/**'
              - 'encryption/**'
              - 'sdks/go/**'
              - 'go.mod'
              - 'go.sum'
              - 'web/dashboard/**'
              - 'deploy/docker/Dockerfile'
              - '.github/workflows/release.yml'

  publish:
    name: Build & publish image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changes
    # Always publish on a version tag — a release must produce its image
    # regardless of which paths the tag points at. On a branch push, build only
    # when something baked into the image changed.
    if: startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.image == 'true'
    steps:
      - uses: actions/checkout@v6
        name: Checkout

      - uses: actions/setup-go@v6
        name: Setup Go
        with:
          go-version-file: go.mod
          check-latest: false

      # vendor/ is gitignored, and the image build is hermetic (-mod=vendor), so
      # regenerate the vendor tree into the build context. Use `go mod vendor`
      # alone (not `go mod tidy`) so the published image is built from the exact
      # committed go.mod/go.sum, never a re-resolved dependency set.
      - name: Vendor dependencies
        run: go mod vendor

      - uses: docker/setup-qemu-action@v3
        name: Set up QEMU
      - uses: docker/setup-buildx-action@v3
        name: Set up Buildx

      - uses: docker/login-action@v3
        name: Log in to GHCR
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        name: Derive image tags
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # main  -> a single tag: the 7-char short commit SHA (no "sha-" prefix)
          # v* tag -> :X.Y.Z only (latest=false, so no :latest is added)
          flavor: latest=false
          tags: |
            type=sha,format=short,prefix=,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - id: build
        name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          # No SBOM/provenance attestations: each attaches an extra untagged
          # manifest per platform to the package listing.
          provenance: false

  publish-chart:
    name: Package & publish Helm chart
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only version tags publish a chart, and only after the matching image is
    # pushed — the chart's appVersion points at an image that must already exist.
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
        name: Checkout

      - uses: azure/setup-helm@v4
        name: Setup Helm

      # Two separate credential stores are needed: `helm push` reads Helm's
      # OCI registry config, while cosign reads Docker's ~/.docker/config.json.
      # Authenticate both against GHCR with the workflow token.
      - uses: docker/login-action@v3
        name: Log in to GHCR (for cosign)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR (for helm)
        run: helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin <<<"${{ secrets.GITHUB_TOKEN }}"

      - id: package
        name: Package chart
        # Pin both the chart version and the appVersion to the release tag
        # (strip the leading "v") so the published artifact always matches the
        # tag, regardless of what Chart.yaml currently holds.
        run: |
          version="${GITHUB_REF_NAME#v}"
          helm package deploy/helm/conveyor \
            --version "${version}" \
            --app-version "${version}" \
            --destination dist
          echo "version=${version}" >>"${GITHUB_OUTPUT}"

      - id: push
        name: Push chart to GHCR
        # helm push prints the pushed digest; capture it for signing.
        run: |
          version="${{ steps.package.outputs.version }}"
          helm push "dist/conveyor-${version}.tgz" "oci://${CHART_REPO}" 2>&1 | tee push.log
          digest="$(awk '/Digest: /{print $NF}' push.log)"
          echo "digest=${digest}" >>"${GITHUB_OUTPUT}"

      - uses: sigstore/cosign-installer@v3
        name: Install cosign
      - name: Sign the published chart
        run: cosign sign --yes "${CHART_REPO}/conveyor@${{ steps.push.outputs.digest }}"

  cleanup:
    name: Prune untagged package versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Run after the image (and, on a tag, the chart) is published. always() so
    # it still runs on main where publish-chart is skipped; the guard keeps it
    # from pruning when the build itself failed.
    needs: [publish, publish-chart]
    if: always() && needs.publish.result == 'success'
    permissions:
      packages: write
    steps:
      # Deletes only genuinely orphaned untagged versions. The action is
      # multi-arch and cosign aware: per-architecture child manifests, SBOM /
      # provenance attestations, and .sig signatures referenced by a tagged
      # image are kept — only versions no tag points at are removed. validate
      # re-checks that every remaining tagged image is still intact afterwards.
      - uses: dataaxiom/ghcr-cleanup-action@v1
        name: Prune the image package
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          package: conveyor
          delete-untagged: true
          validate: true

      - uses: dataaxiom/ghcr-cleanup-action@v1
        name: Prune the chart package
        # The chart package only exists once a tag has published it.
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          package: charts/conveyor
          delete-untagged: true
          validate: true
