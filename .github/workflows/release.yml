name: release

# Publishes the conveyor container image to the GitHub Container Registry and,
# for releases, the Helm chart. This workflow runs in three ways:
#   - push to main          -> rebuilds the :<short-sha> image when something
#                              baked into the image changed (see `changes`).
#   - push of a v* tag       -> publishes the :X.Y.Z image + chart (covers a tag
#                              pushed manually with git).
#   - workflow_call/_dispatch with a `tag` input -> publishes the :X.Y.Z image +
#                              chart for that tag. changelog-release.yml calls it
#                              this way immediately after cutting a release, so a
#                              release created with the default GITHUB_TOKEN still
#                              gets its image and chart — a called/dispatched
#                              workflow runs inside the current run rather than as
#                              a new tag-push event, so GitHub's recursive-trigger
#                              suppression does not apply and no PAT is required.
#
# Each build produces a single multi-arch image (amd64 + arm64). A multi-arch
# image is an index that references one manifest per architecture, so GHCR always
# lists those per-arch manifests as untagged versions next to the tag:
#   - branch build -> :<short-sha>   (a single tag: the 7-char commit)
#   - release build -> :X.Y.Z        (the release version, nothing else)
# No SBOM/provenance attestations are attached (each would add another untagged
# manifest); the originating commit is still recorded as the OCI
# org.opencontainers.image.revision label.
#
# On a release build it also packages and pushes the Helm chart as an OCI artifact
#   - oci://ghcr.io/conveyorq/charts/conveyor:X.Y.Z
# with the chart version and appVersion pinned to the tag and signed with
# cosign (keyless). Branch builds do not publish a chart.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_call:
    inputs:
      tag:
        description: "Version tag to build and publish (e.g. v0.4.0). Always publishes the image and chart for that tag."
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to build and publish (e.g. v0.4.0). Always publishes the image and chart for that tag."
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write # cosign keyless signing

env:
  IMAGE: ghcr.io/conveyorq/conveyor
  # Helm charts publish under a separate OCI namespace so the chart repository
  # (charts/conveyor) never collides with the image repository (conveyor).
  CHART_REPO: ghcr.io/conveyorq/charts

# Coalesce rapid pushes to the same ref (e.g. successive pushes to main); each
# tag / dispatched release is its own ref, so release publishes never cancel one
# another.
concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: true

jobs:
  # Resolve, once, what this run is building: a specific version tag (a release)
  # or the current commit on a branch. Every downstream job keys off these
  # outputs so the three entry points (branch push, tag push, call/dispatch)
  # share one code path.
  setup:
    name: Resolve build target
    runs-on: ubuntu-latest
    outputs:
      # The git ref to check out and build.
      ref: ${{ steps.resolve.outputs.ref }}
      # 'true' for a version release (publish :X.Y.Z image + chart); 'false' for
      # an ordinary branch build (publish :<short-sha> image only).
      is_release: ${{ steps.resolve.outputs.is_release }}
    steps:
      - id: resolve
        name: Resolve ref and release flag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_TAG}" ]]; then
            # Explicit tag from workflow_call (changelog-release) or workflow_dispatch.
            echo "ref=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # A v* tag pushed directly with git.
            echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            # Ordinary branch build: pin to the exact commit that triggered it.
            echo "ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

  # Gate branch-build image publishing on the contents of the image. A push to
  # main only rebuilds the :<sha> image when something that actually ends up
  # inside it changed — Go sources, dependencies, the embedded dashboard, or the
  # Dockerfile. Docs, examples, the Python/TypeScript SDKs, Helm charts, and
  # other tooling never alter the binary, so they skip the build entirely.
  # Releases skip this filter and always publish (see `publish`).
  changes:
    name: Changes Detection
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.is_release != 'true'
    outputs:
      image: ${{ steps.filter.outputs.image }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            image:
              - 'cmd/**'
              - 'internal/**'
              - 'server/**'
              - 'embedded/**'
              - 'encryption/**'
              - 'sdks/go/**'
              - 'go.mod'
              - 'go.sum'
              - 'web/dashboard/**'
              - 'deploy/docker/Dockerfile'
              - '.github/workflows/release.yml'

  publish:
    name: Build & publish image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [setup, changes]
    # Always publish on a release — it must produce its image regardless of which
    # paths the tag points at. On a branch push, build only when something baked
    # into the image changed. !cancelled() lets this run even though `changes` is
    # skipped on a release.
    if: >-
      !cancelled()
      && needs.setup.result == 'success'
      && (needs.setup.outputs.is_release == 'true' || needs.changes.outputs.image == 'true')
    steps:
      - uses: actions/checkout@v7
        name: Checkout
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - uses: actions/setup-go@v6
        name: Setup Go
        with:
          go-version-file: go.mod
          check-latest: false

      # vendor/ is gitignored, and the image build is hermetic (-mod=vendor), so
      # regenerate the vendor tree into the build context. Use `go mod vendor`
      # alone (not `go mod tidy`) so the published image is built from the exact
      # committed go.mod/go.sum, never a re-resolved dependency set.
      - name: Vendor dependencies
        run: go mod vendor

      - uses: docker/setup-qemu-action@v4
        name: Set up QEMU
      - uses: docker/setup-buildx-action@v4
        name: Set up Buildx

      - uses: docker/login-action@v4
        name: Log in to GHCR
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        name: Derive image tags
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          # branch build  -> a single tag: the 7-char short commit SHA (no "sha-" prefix)
          # release build -> :X.Y.Z only (latest=false, so no :latest is added)
          flavor: latest=false
          tags: |
            type=sha,format=short,prefix=,enable=${{ needs.setup.outputs.is_release != 'true' }}
            type=semver,pattern={{version}},value=${{ needs.setup.outputs.ref }},enable=${{ needs.setup.outputs.is_release == 'true' }}

      - id: build
        name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          # No SBOM/provenance attestations: each attaches an extra untagged
          # manifest per platform to the package listing.
          provenance: false

  publish-chart:
    name: Package & publish Helm chart
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Set explicitly at the job level: `helm push` needs packages:write and
    # cosign keyless signing needs id-token:write. Job-level permissions are
    # guaranteed to reach the runner, avoiding any reliance on workflow-level
    # inheritance for the OIDC token.
    permissions:
      contents: read
      packages: write
      id-token: write
    # Only releases publish a chart, and only after the matching image is pushed
    # — the chart's appVersion points at an image that must already exist.
    # !cancelled() is required: without a status-check function GitHub injects an
    # implicit success() that also fails when the transitively-needed `changes`
    # job is skipped (as it is on the release path), which would skip this job.
    needs: [setup, publish]
    if: >-
      !cancelled()
      && needs.setup.outputs.is_release == 'true'
      && needs.publish.result == 'success'
    steps:
      - uses: actions/checkout@v7
        name: Checkout
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - uses: azure/setup-helm@v5
        name: Setup Helm

      # Two separate credential stores are needed: `helm push` reads Helm's
      # OCI registry config, while cosign reads Docker's ~/.docker/config.json.
      # Authenticate both against GHCR with the workflow token.
      - uses: docker/login-action@v4
        name: Log in to GHCR (for cosign)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR (for helm)
        run: helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin <<<"${{ secrets.GITHUB_TOKEN }}"

      - id: package
        name: Package chart
        # Pin both the chart version and the appVersion to the release tag
        # (strip the leading "v") so the published artifact always matches the
        # tag, regardless of what Chart.yaml currently holds.
        env:
          RELEASE_REF: ${{ needs.setup.outputs.ref }}
        run: |
          set -euo pipefail
          version="${RELEASE_REF#v}"
          helm package deploy/helm/conveyor \
            --version "${version}" \
            --app-version "${version}" \
            --destination dist
          echo "version=${version}" >>"${GITHUB_OUTPUT}"

      - name: Verify chart version/appVersion match the tag
        # Fail the release before publishing if the packaged metadata does not
        # match the tag — appVersion is the default image tag consumers pull
        # (statefulset.yaml: image.tag | default .Chart.AppVersion), so a wrong
        # value would point installs at the wrong (or missing) image.
        env:
          EXPECTED: ${{ steps.package.outputs.version }}
        run: |
          set -euo pipefail
          meta="$(helm show chart "dist/conveyor-${EXPECTED}.tgz")"
          got_ver="$(awk '/^version:/{print $2}' <<<"$meta")"
          got_app="$(awk '/^appVersion:/{print $2}' <<<"$meta" | tr -d '"')"
          echo "expected=${EXPECTED} version=${got_ver} appVersion=${got_app}"
          if [[ "$got_ver" != "$EXPECTED" || "$got_app" != "$EXPECTED" ]]; then
            echo "::error::packaged chart version/appVersion (${got_ver}/${got_app}) does not match tag (${EXPECTED})"
            exit 1
          fi

      - id: push
        name: Push chart to GHCR
        # helm push prints the pushed digest; capture it for signing.
        run: |
          set -euo pipefail
          version="${{ steps.package.outputs.version }}"
          helm push "dist/conveyor-${version}.tgz" "oci://${CHART_REPO}" 2>&1 | tee push.log
          digest="$(awk '/Digest: /{print $NF}' push.log)"
          echo "digest=${digest}" >>"${GITHUB_OUTPUT}"

      - uses: sigstore/cosign-installer@v4.1.2
        name: Install cosign
      - name: Sign the published chart
        run: cosign sign --yes "${CHART_REPO}/conveyor@${{ steps.push.outputs.digest }}"

  cleanup:
    name: Prune untagged package versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Run after the image (and, on a release, the chart) is published. Guard on
    # the image build actually succeeding so nothing is pruned when it failed.
    needs: [setup, publish, publish-chart]
    if: always() && needs.publish.result == 'success'
    permissions:
      packages: write
    steps:
      # Deletes only genuinely orphaned untagged versions. The action is
      # multi-arch and cosign aware: per-architecture child manifests, SBOM /
      # provenance attestations, and .sig signatures referenced by a tagged
      # image are kept — only versions no tag points at are removed. validate
      # re-checks that every remaining tagged image is still intact afterwards.
      - uses: dataaxiom/ghcr-cleanup-action@v1
        name: Prune the image package
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          package: conveyor
          delete-untagged: true
          validate: true

      - uses: dataaxiom/ghcr-cleanup-action@v1
        name: Prune the chart package
        # The chart package only exists once a release has published it.
        if: needs.setup.outputs.is_release == 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          package: charts/conveyor
          delete-untagged: true
          validate: true
