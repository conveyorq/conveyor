name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Changes Detection
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.filter.outputs.build }}
      deploy: ${{ steps.filter.outputs.deploy }}
      ts_py: ${{ steps.filter.outputs.ts_py }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # "build" is true if core Go code, its dependencies, proto contracts,
          # or the build/CI toolchain config changed.
          # "deploy" is true if anything that affects the deployed artifact changed.
          filters: |
            # Go packages compiled into the conveyord/conveyor binaries. The
            # examples, benchmarks, and Python/TypeScript SDKs live in the same
            # module but ship in neither binary, so they must not trigger a
            # build; docs and unrelated tooling are excluded the same way.
            code: &code
              - 'cmd/**'
              - 'internal/**'
              - 'server/**'
              - 'embedded/**'
              - 'encryption/**'
              - 'sdks/go/**'
            build:
              - *code
              - 'go.mod'
              - 'go.sum'
              - 'protos/**/*.proto'
              - 'buf.yaml'
              - 'buf.gen.yaml'
              - 'Makefile'
              - 'hack/cover.sh'
              - '.golangci.yml'
              - '.github/workflows/ci.yml'
            deploy:
              - *code
              - 'go.mod'
              - 'go.sum'
              - 'web/dashboard/**'
              - 'deploy/**'
              - 'hack/e2e-kind.sh'
              - 'hack/e2e-load.Dockerfile'
              - 'hack/e2e-load/**'
              - '.github/workflows/ci.yml'
            # "ts_py" is true when the TypeScript or Python code (dashboard,
            # SDKs, examples) or the lint toolchain changed. It gates the
            # TS/Python lint job, kept off the heavy Go build matrix on purpose.
            ts_py:
              - 'web/dashboard/**'
              - 'sdks/typescript/**'
              - 'sdks/python/**'
              - 'examples/typescript/**'
              - 'examples/python/**'
              - 'Makefile'
              - '.github/workflows/ci.yml'

  # Single heavy job: builds, regenerates and verifies protos, lints, runs the
  # race suite, and runs the DX quickstart — across the runner matrix. Skipped
  # when no build-relevant path changed or the pull request is still a draft.
  # (proto/lint/quickstart use the Dockerfile.tools image and the quickstart's
  # shell, so the matrix is Linux-only; guard those steps before adding other
  # runners.)
  build:
    name: Build & verify on ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.build == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ${{ matrix.runner }}
    # Backstop against a hung test under -race: fail in 30m rather than
    # running to GitHub's multi-hour job limit.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Standard 4-vCPU runner. The heaviest cluster-mode load test
          # (TestEngineProcessesWeightedQueues) is t.Skip'd because it needs
          # 8 vCPUs to drain in time under -race; switch to an 8-vCPU larger
          # runner and drop that t.Skip to re-enable it.
          - os: linux
            runner: ubuntu-latest

    env:
      TZ: UTC                 # stable timezone for time-dependent tests
      CGO_ENABLED: "1"        # the race detector requires cgo
      GOTOOLCHAIN: local      # avoid auto-upgrading the toolchain
      GOFLAGS: -mod=readonly  # fail on go.mod/go.sum drift

    steps:
      - uses: actions/checkout@v7
        name: Checkout
      - uses: actions/setup-go@v7
        name: Setup Go
        with:
          go-version-file: go.mod
          check-latest: false
          cache-dependency-path: "**/*.sum"
      - uses: actions/cache@v6
        name: Cache Go build and modules
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Vendoring
        run: go mod tidy && go mod vendor
      - name: Download dependencies
        run: |
          go mod download
      - uses: pnpm/action-setup@v6
        name: Setup pnpm
        with:
          version: 11
      - uses: actions/setup-node@v6
        name: Setup Node
        with:
          node-version: "24"
      - name: Build dashboard
        # dist/ is not committed; build it so the embedded UI is real for the
        # lint typecheck and the dashboard tests.
        run: make dashboard
      - name: Lint
        if: matrix.os == 'linux'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout 10m --config .golangci.yml
      - name: License headers
        if: matrix.os == 'linux'
        run: make license-check
      - name: Test (race)
        # `make test` runs hack/cover.sh: the race suite over the curated
        # package set, with the overall coverage number reported at the end.
        # See that script for the race/serialization flags and what the
        # coverage denominator excludes.
        run: make test
      
      - name: Upload coverage report
        if: matrix.os == 'linux'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          slug: conveyorq/conveyor
      # DX gate: the build above warmed the cache, so the 60s budget measures
      # the quickstart workflow, not the compiler's cold start.
      - name: Quickstart (60s budget)
        run: timeout 60 make quickstart

  # Lightweight lint of the non-Go code. It is kept off the heavy build matrix
  # on purpose: a TypeScript or Python change must not drag in the Go race suite
  # and the quickstart, so it runs here against its own path filter.
  lint-ts-py:
    name: Lint TypeScript & Python
    needs: changes
    if: needs.changes.outputs.ts_py == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        name: Checkout
      - uses: pnpm/action-setup@v6
        name: Setup pnpm
        with:
          version: 11
      - uses: actions/setup-node@v6
        name: Setup Node
        with:
          node-version: "24"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        name: Setup uv
        with:
          # Provide a deterministic interpreter so `uv venv` does not depend on
          # whatever Python the runner ships.
          python-version: "3.12"
      - name: Lint TypeScript (tsc)
        run: make lint-ts
      - name: Lint Python (ruff + mypy)
        run: make lint-py

  # Packaging gate: build the image, install the Helm chart on a throwaway kind
  # cluster, and assert the StatefulSet rolls out, the nodes form a cluster
  # through the Kubernetes discovery RBAC, and the metrics endpoint serves.
  # Runs when code or any deployment artifact changed.
  e2e:
    name: Kind e2e
    needs: changes
    if: (needs.changes.outputs.build == 'true' || needs.changes.outputs.deploy == 'true') && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        name: Checkout
      - uses: actions/setup-go@v7
        name: Setup Go
        with:
          go-version-file: go.mod
          check-latest: false
          cache-dependency-path: "**/*.sum"
      - name: Vendoring
        run: go mod tidy && go mod vendor
      - name: Install kind
        run: |
          curl -sSLo ./kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
      - uses: azure/setup-helm@v5
        name: Setup Helm
      - name: Kind e2e
        run: make e2e
