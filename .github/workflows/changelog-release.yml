name: changelog-release

# Cuts a release straight from CHANGELOG.md. Development keeps the top section as
# `## [Unreleased]`; to ship, rename it to a dated, versioned header in the same
# bracketed Keep-a-Changelog style the file already uses:
#
#   ## [v0.2.0] - 2026-06-22
#
# When that edit lands on main this workflow parses the top section, extracts its
# body as the release notes, appends the merged Pull Requests and a full
# changelog link, and creates the GitHub release — which creates the `v0.2.0`
# tag. The image/chart publishing in release.yml then fires off that tag.
#
# Nothing happens unless the top section is a versioned, dated header whose tag
# does not yet exist, so ordinary CHANGELOG edits (a still-`[Unreleased]` top, or
# re-touching an already-released version) are no-ops.
#
# Publishing the image/chart: a release created with the default GITHUB_TOKEN does
# NOT start tag-triggered workflows (GitHub suppresses recursive runs), so this
# workflow does not rely on the cut tag firing release.yml. Instead it calls
# release.yml directly (workflow_call) once the release is cut. A called workflow
# runs inside this same run rather than as a new tag-push event, so the image and
# chart are published with the default GITHUB_TOKEN — no PAT required.

on:
  push:
    branches: [main]
    paths:
      - CHANGELOG.md
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Parse CHANGELOG and print the release notes, but skip tag/release creation."
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Cut release from CHANGELOG
    runs-on: ubuntu-latest
    outputs:
      # Empty on dispatch dry-runs and non-release CHANGELOG edits; otherwise the
      # cut version tag (e.g. v0.4.0). The publish job keys off skip/version.
      version: ${{ steps.parse.outputs.version }}
      skip: ${{ steps.parse.outputs.skip }}
    env:
      GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: Parse top CHANGELOG section
        id: parse
        run: |
          set -euo pipefail

          header=$(awk '/^## / { print; exit }' CHANGELOG.md)
          echo "Top header: ${header}"

          # The header must be a versioned, dated section in the bracketed style
          # the file uses (e.g. "## [v0.2.0] - 2026-06-22"). A still-`[Unreleased]`
          # top, or any other shape, is not a release.
          if [[ ! "$header" =~ ^"## ["(v[0-9]+\.[0-9]+\.[0-9]+)"] - "[0-9]{4}-[0-9]{2}-[0-9]{2}[[:space:]]*$ ]]; then
            echo "Top section is not a versioned release; nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          version="${BASH_REMATCH[1]}"

          if git rev-parse --verify --quiet "refs/tags/${version}" >/dev/null; then
            echo "Tag ${version} already exists; nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Capture the section body verbatim, dropping leading and trailing blank
          # lines, up to the next "## " header.
          awk -v hdr="$header" '
            $0 == hdr { capture = 1; next }
            capture && /^## / { exit }
            capture {
              buf = buf $0 "\n"
              if (NF) { final = buf; started = 1 }
              if (!NF && !started) { buf = "" }
            }
            END { printf "%s", final }
          ' CHANGELOG.md > release-notes.md

          if [[ ! -s release-notes.md ]]; then
            echo "Extracted release notes are empty; refusing to publish."
            exit 1
          fi

          prev=$(git tag --list 'v*' --sort=-v:refname | head -n 1 || true)
          if [[ -n "${prev}" ]]; then
            # Append the merged pull requests between the previous tag and this
            # commit, deduplicated by PR number.
            shas_file=$(mktemp)
            prs_file=$(mktemp)
            if ! gh api "repos/${GITHUB_REPOSITORY}/compare/${prev}...${GITHUB_SHA}" \
                  --jq '.commits[].sha' > "$shas_file"; then
              echo "::warning::compare ${prev}...${GITHUB_SHA} failed; Pull Requests section will be incomplete"
            fi

            while IFS= read -r sha; do
              [[ -z "$sha" ]] && continue
              if ! gh api "repos/${GITHUB_REPOSITORY}/commits/${sha}/pulls" \
                    --jq '.[] | select(.merged_at != null) | "\(.number)\t\(.title)\t\(.user.login)"' \
                    >> "$prs_file"; then
                echo "::warning::PR lookup failed for ${sha}; release notes may be missing entries"
              fi
            done < "$shas_file"
            rm -f "$shas_file"

            if [[ -s "$prs_file" ]]; then
              printf '\n### Pull Requests\n\n' >> release-notes.md
              awk -F'\t' '!seen[$1]++ { printf "- #%s %s by @%s\n", $1, $2, $3 }' \
                "$prs_file" >> release-notes.md
            fi
            rm -f "$prs_file"

            printf '\n**Full Changelog**: https://github.com/%s/compare/%s...%s\n' \
              "${GITHUB_REPOSITORY}" "${prev}" "${version}" >> release-notes.md
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Dry-run preview
        if: steps.parse.outputs.skip != 'true' && github.event.inputs.dry_run == 'true'
        run: |
          echo "::group::Would publish ${{ steps.parse.outputs.version }}"
          echo "Target SHA:   ${{ github.sha }}"
          echo "Tag / title:  ${{ steps.parse.outputs.version }}"
          echo "----- release-notes.md -----"
          cat release-notes.md
          echo "----- end -----"
          echo "::endgroup::"
          echo "Dry run: no tag and no release created."

      - name: Create GitHub release
        if: steps.parse.outputs.skip != 'true' && github.event.inputs.dry_run != 'true'
        run: |
          set -euo pipefail
          gh release create "${{ steps.parse.outputs.version }}" \
            --target "${{ github.sha }}" \
            --title "${{ steps.parse.outputs.version }}" \
            --notes-file release-notes.md \
            --verify-tag=false

  # Publish the image and chart for the freshly cut tag. Calling release.yml
  # (rather than relying on the tag to trigger it) keeps everything inside this
  # run, so the default GITHUB_TOKEN is enough — see the note at the top of this
  # file. Skipped on dry-runs and when no release was cut.
  publish:
    name: Publish image & chart
    needs: release
    if: needs.release.outputs.skip != 'true' && github.event.inputs.dry_run != 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.release.outputs.version }}
    secrets: inherit
