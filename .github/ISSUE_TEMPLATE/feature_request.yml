name: Feature request
description: Propose a new capability or an enhancement to an existing one.
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please search existing issues and the [roadmap discussions](https://github.com/conveyorq/conveyor/discussions) first.

        Describing the problem you are trying to solve, not just the solution you have in mind, helps us find the best design.
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do, and what makes it hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you would like Conveyor to do. Include API shape or config if you have one in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you tried or rejected, including workarounds you use now.
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Where would this feature live?
      options:
        - Server (conveyord)
        - Go SDK
        - TypeScript SDK
        - Python SDK
        - CLI (conveyor)
        - Dashboard
        - Broker
        - Helm chart / deployment
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Prior art in other queues (asynq, River, Sidekiq, Celery, …), links, or constraints.
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I am willing to contribute this (or help with it).
          required: false
