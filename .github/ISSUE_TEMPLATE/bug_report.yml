name: Bug report
description: Report something that does not work as documented or expected.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please search existing issues first to avoid duplicates.

        Do **not** report security vulnerabilities here. Follow the [security policy](https://github.com/conveyorq/conveyor/blob/main/SECURITY.md) instead.
  - type: textarea
    id: summary
    attributes:
      label: What happened
      description: A clear, concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The smallest sequence that reproduces the problem. A minimal code snippet or a failing test is ideal.
      placeholder: |
        1. Start `conveyord --dev`
        2. Enqueue a task with `...`
        3. Observe `...`
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Where does the bug occur?
      options:
        - Server (conveyord)
        - Go SDK
        - TypeScript SDK
        - Python SDK
        - CLI (conveyor)
        - Dashboard
        - Helm chart / deployment
        - Other / not sure
    validations:
      required: true
  - type: dropdown
    id: broker
    attributes:
      label: Broker
      options:
        - Postgres
        - In-memory
        - Not applicable
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Deployment mode
      options:
        - standalone
        - cluster
        - kubernetes
        - embedded
        - Not applicable
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Conveyor version
      description: The conveyord/SDK release tag or commit SHA.
      placeholder: "v0.1.0 (or commit abc1234)"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS and architecture, plus Go/Node/Python version and Postgres version where relevant.
      placeholder: "macOS 15 arm64, Go 1.26, Postgres 16"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, stack traces, or output
      description: Paste relevant server/worker logs or errors. This is rendered as a code block, so no backticks are needed.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I reduced this to the smallest reproduction I could.
          required: true
        - label: I am willing to help test a fix.
          required: false
