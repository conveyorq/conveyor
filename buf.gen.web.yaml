version: v2
# TypeScript client for the dashboard SPA. Generated into web/dashboard/src/gen
# and committed, so the frontend build never needs buf. Connect-ES v2 emits the
# service descriptors into the -es output, so no separate connect plugin is
# needed. Refresh with `make dashboard-gen`.
clean: true
plugins:
  - local: ./web/dashboard/node_modules/.bin/protoc-gen-es
    out: web/dashboard/src/gen
    opt:
      - target=ts
