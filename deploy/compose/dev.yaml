# Local development stack: Postgres 16 for running conveyord against a
# real broker. Integration tests do not use this stack; they start their
# own throwaway Postgres via testcontainers-go (`make integration`).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: conveyor
      POSTGRES_PASSWORD: conveyor
      POSTGRES_DB: conveyor
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conveyor -d conveyor"]
      interval: 2s
      timeout: 2s
      retries: 15
