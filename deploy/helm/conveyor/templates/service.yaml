apiVersion: v1
kind: Service
metadata:
  name: {{ include "conveyor.fullname" . }}
  labels:
    {{- include "conveyor.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "conveyor.selectorLabels" . | nindent 4 }}
  ports:
    # Only the API port is exposed; cluster ports stay pod-to-pod and are
    # discovered directly by pod IP, not through this Service.
    - name: api
      port: {{ .Values.service.port }}
      targetPort: api
---
# Headless governing service for the StatefulSet: gives each pod a stable
# DNS name and publishes pod endpoints before they are Ready, which the
# clustering layer relies on during bootstrap.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "conveyor.fullname" . }}-headless
  labels:
    {{- include "conveyor.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "conveyor.selectorLabels" . | nindent 4 }}
  ports:
    - name: remoting
      port: {{ .Values.ports.remoting }}
      targetPort: remoting
    - name: gossip
      port: {{ .Values.ports.gossip }}
      targetPort: gossip
    - name: cluster
      port: {{ .Values.ports.cluster }}
      targetPort: cluster
