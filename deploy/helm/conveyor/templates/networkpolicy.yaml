{{- if .Values.networkPolicy.enabled -}}
# Example policy: restrict the cluster ports (remoting, gossip, peers) to
# other conveyor pods, while leaving the API and metrics ports reachable. The
# api/metrics rule below has no `from`, so it admits any in-cluster client in
# any namespace. Scope it (a namespaceSelector/podSelector for your clients and
# your Prometheus) before relying on this in production. Egress is intentionally
# unrestricted so peer discovery via the Kubernetes API and DNS keep working.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "conveyor.fullname" . }}
  labels:
    {{- include "conveyor.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "conveyor.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Peer-to-peer cluster traffic, conveyor pods only.
    - from:
        - podSelector:
            matchLabels:
              {{- include "conveyor.selectorLabels" . | nindent 14 }}
      ports:
        - port: remoting
        - port: gossip
        - port: cluster
    # API traffic from clients, and metrics scraping from Prometheus.
    - ports:
        - port: api
        - port: metrics
{{- end }}
