{{- if .Values.serviceMonitor.enabled -}}
# Requires the Prometheus Operator CRDs. conveyord serves Prometheus metrics
# at {{ .Values.serviceMonitor.path }} on the dedicated metrics port.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "conveyor.fullname" . }}
  labels:
    {{- include "conveyor.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "conveyor.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      path: {{ .Values.serviceMonitor.path }}
      interval: {{ .Values.serviceMonitor.interval }}
      {{- if .Values.metrics.dropGatewaySeries }}
      # Drop GoAkt's per-worker-session actor series; their ULID names grow
      # unbounded as workers reconnect.
      metricRelabelings:
        - sourceLabels: [actor_name]
          regex: gateway-.*
          action: drop
      {{- end }}
{{- end }}
