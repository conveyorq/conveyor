{{- /*
Render a Secret only for inline values. When broker.dsnSecret.name or
auth.tokensSecret.name point at an existing Secret, that one is used instead
and nothing is generated here.
*/ -}}
{{- $needDSN := and .Values.broker.dsn (not .Values.broker.dsnSecret.name) -}}
{{- $needTokens := and .Values.auth.tokens (not .Values.auth.tokensSecret.name) -}}
{{- if or $needDSN $needTokens -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "conveyor.fullname" . }}
  labels:
    {{- include "conveyor.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if $needDSN }}
  dsn: {{ .Values.broker.dsn | quote }}
  {{- end }}
  {{- if $needTokens }}
  # CONVEYOR_API__AUTH_TOKENS is a comma-separated list.
  auth-tokens: {{ join "," .Values.auth.tokens | quote }}
  {{- end }}
{{- end }}
