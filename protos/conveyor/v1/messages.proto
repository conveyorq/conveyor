syntax = "proto3";

package conveyor.v1;

import "conveyor/v1/task.proto";
import "google/protobuf/timestamp.proto";

// Actor messages exchanged inside the conveyord cluster.
//
// Design rule: messages carry hints and identities; the broker carries data.
// The only data-bearing message is ExecuteTask, whose task is already
// durably leased. These messages never cross the public API boundary.

// TaskEnqueued tells a queue grain that one new task was committed.
message TaskEnqueued {
  string queue = 1;
}

// TasksAvailable tells a queue grain that due work exists (reaper sweep).
message TasksAvailable {
  string queue = 1;
  // hint is the approximate number of due tasks; informational only.
  int64 hint = 2;
}

// RegisterGateway announces a worker gateway and its capacity to a queue
// grain. Re-sent periodically as a heartbeat to heal grain relocation.
message RegisterGateway {
  string queue = 1;
  // gateway_name is the gateway actor name used for TellActor dispatch.
  string gateway_name = 2;
  // capacity is the worker's declared concurrency for this queue.
  int32 capacity = 3;
  // batch_types are the task types this gateway's worker handles as batches,
  // so the grain dispatches a fired group only to a capable gateway.
  repeated string batch_types = 4;
  // weight is the worker's declared dispatch weight for this queue. The grain
  // distributes leased tasks across gateways in proportion to their weights, so
  // a higher weight draws proportionally more work. A non-positive value (an
  // older worker that predates weighted dispatch) is treated as weight one.
  int32 weight = 5;
}

// GatewayCredit grants dispatch credits from a gateway to a queue grain.
message GatewayCredit {
  string queue = 1;
  string gateway_name = 2;
  int32 credits = 3;
}

// ExecuteTask carries one durably leased task from a queue grain to a
// gateway for dispatch down the worker stream.
message ExecuteTask {
  conveyor.v1.TaskEnvelope task = 1;
  string lease_id = 2;
  google.protobuf.Timestamp lease_expires_at = 3;
}

// ExecuteBatch carries one durably leased aggregation group from a queue grain
// to a gateway for batch dispatch. The members share one lease_id; the gateway
// delivers them as a single BatchDispatch frame.
message ExecuteBatch {
  repeated conveyor.v1.TaskEnvelope tasks = 1;
  string lease_id = 2;
  google.protobuf.Timestamp lease_expires_at = 3;
  string group = 4;
}

// FireGroup tells a queue grain that an aggregation group is due: the grain
// leases its members and batch-dispatches them. The group-sweeper singleton
// sends it after a group's size, delay, or grace threshold trips.
message FireGroup {
  string queue = 1;
  string group = 2;
  // type is the group's task type (members are single-type), used to pick a
  // batch-capable gateway before leasing.
  string type = 3;
}

// GroupLeaseCompleted delivers the outcome of an asynchronous group lease back
// to the queue grain that initiated it. Leasing runs off the grain turn through
// PipeToSelf (broker I/O never blocks the grain), and the grain dispatches the
// batch when this arrives. A failed lease carries the broker error message.
message GroupLeaseCompleted {
  repeated conveyor.v1.TaskEnvelope tasks = 1;
  string lease_id = 2;
  google.protobuf.Timestamp lease_expires_at = 3;
  string group = 4;
  // type is the group's task type, used to re-pick a batch-capable gateway at
  // dispatch time (a gateway may have changed since the lease began).
  string type = 5;
  // error is the broker failure message; empty when the lease succeeded.
  string error = 6;
}

// TaskCompleted signals a finished execution back to the queue grain. It
// is also the credit refill signal: the named gateway regains one dispatch
// credit, which may start another lease cycle.
message TaskCompleted {
  string task_id = 1;
  string queue = 2;
  bool success = 3;
  string gateway_name = 4;
}

// BatchCompleted signals a finished batch execution back to the queue grain.
// One batch consumes one dispatch credit regardless of member count, so it
// refills exactly one credit; total and succeeded update the task counters.
message BatchCompleted {
  string queue = 1;
  string gateway_name = 2;
  // total is the number of members in the batch.
  int32 total = 3;
  // succeeded is how many members completed successfully.
  int32 succeeded = 4;
}

// DrainQueue pauses dispatch for a queue (persisted via the broker).
message DrainQueue {
  string queue = 1;
}

// ResumeQueue resumes dispatch for a paused queue.
message ResumeQueue {
  string queue = 1;
}

// CancelActive asks the gateway executing a task to send a Cancel frame to
// its worker (grain -> gateway -> worker).
message CancelActive {
  string task_id = 1;
}

// RateLimitChanged tells a queue grain that its dispatch-rate override changed
// through the Admin API. It carries the new values so the grain rebuilds its
// token bucket without a broker read: rate_per_sec greater than zero sets the
// override, while zero reverts the queue to the server's global default.
message RateLimitChanged {
  string queue = 1;
  double rate_per_sec = 2;
  int32 burst = 3;
}

// ConcurrencyLimitChanged tells a queue grain that its per-key concurrency limit
// changed through the Admin API. It carries the new value so the grain updates
// its keyed semaphore without a broker read: max_active greater than zero sets
// the limit, while zero clears it and leaves the queue's keys unbounded.
message ConcurrencyLimitChanged {
  string queue = 1;
  int32 max_active = 2;
}

// FireCron tells the scheduler singleton that a cron entry is due.
message FireCron {
  string entry_id = 1;
}

// CronEntriesChanged tells the scheduler singleton to reload cron entries
// from the broker after an Admin API mutation.
message CronEntriesChanged {}

// LeaseCycleCompleted delivers the outcome of an asynchronous lease cycle
// back to the queue grain that initiated it. A failed cycle carries the
// broker error message; the next wake-up retries the cycle.
message LeaseCycleCompleted {
  repeated conveyor.v1.TaskEnvelope tasks = 1;
  string lease_id = 2;
  google.protobuf.Timestamp lease_expires_at = 3;
  // error is the broker failure message; empty when the cycle succeeded.
  string error = 4;
}

// LeasedTasksReleased delivers the outcome of an asynchronous release back
// to the queue grain that initiated it. The grain releases a leased batch
// back to pending when it cannot dispatch it — the queue paused mid-cycle,
// or the only gateways with credits went away — so the work redelivers
// instead of waiting out the lease. The grain only logs this result; the
// counts are informational.
message LeasedTasksReleased {
  // released is the number of tasks returned to pending.
  int32 released = 1;
  // failed is the number whose release failed; those redeliver on lease
  // expiry via the reaper.
  int32 failed = 2;
}

// PromoteTick triggers one scheduled-task promotion pass on the scheduler.
message PromoteTick {}

// ReapTick triggers one maintenance pass on the reaper.
message ReapTick {}

// GroupSweepTick triggers one firing pass on the group-aggregation sweeper.
message GroupSweepTick {}

// ResolveDependents asks a dependency resolver to reconcile the tasks waiting on
// one just-finished task and wake any queue whose work became eligible. It is
// dispatched off the gateway's turn so the resolving broker transaction never
// blocks task delivery.
message ResolveDependents {
  // task_id is the finished task whose dependents are to be reconciled.
  string task_id = 1;
}
