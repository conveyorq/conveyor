syntax = "proto3";

package conveyor.v1;

import "conveyor/v1/task.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

// Public wire contract. One ConnectRPC port serves gRPC, gRPC-Web, and
// HTTP/JSON. SDKs, the CLI, and the dashboard all consume these services;
// after v1.0 changes must be additive only.

// TaskService is the enqueue-side API.
service TaskService {
  // Enqueue durably commits one task. Idempotent on a client-supplied id.
  rpc Enqueue(EnqueueRequest) returns (EnqueueResponse) {}
  // EnqueueBatch commits many tasks in one call; results are per-item.
  rpc EnqueueBatch(EnqueueBatchRequest) returns (EnqueueBatchResponse) {}
  // GetTask returns the current state of one task.
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse) {}
}

// WorkerService carries worker sessions.
service WorkerService {
  // Session is the single bidirectional stream a worker process holds.
  rpc Session(stream WorkerMessage) returns (stream ServerMessage) {}
}

// AdminService is the inspection and operations API.
service AdminService {
  rpc ListQueues(ListQueuesRequest) returns (ListQueuesResponse) {}
  rpc PauseQueue(PauseQueueRequest) returns (PauseQueueResponse) {}
  rpc ResumeQueue(ResumeQueueRequest) returns (ResumeQueueResponse) {}
  // ListRateLimits returns every per-queue dispatch-rate override.
  rpc ListRateLimits(ListRateLimitsRequest) returns (ListRateLimitsResponse) {}
  // SetQueueRateLimit sets a queue's dispatch-rate override.
  rpc SetQueueRateLimit(SetQueueRateLimitRequest) returns (SetQueueRateLimitResponse) {}
  // DeleteQueueRateLimit clears a queue's override, reverting it to the default.
  rpc DeleteQueueRateLimit(DeleteQueueRateLimitRequest) returns (DeleteQueueRateLimitResponse) {}
  // ListConcurrencyLimits returns every per-queue concurrency limit.
  rpc ListConcurrencyLimits(ListConcurrencyLimitsRequest) returns (ListConcurrencyLimitsResponse) {}
  // SetQueueConcurrencyLimit sets a queue's per-key concurrency limit.
  rpc SetQueueConcurrencyLimit(SetQueueConcurrencyLimitRequest) returns (SetQueueConcurrencyLimitResponse) {}
  // DeleteQueueConcurrencyLimit clears a queue's concurrency limit, leaving its keys unbounded.
  rpc DeleteQueueConcurrencyLimit(DeleteQueueConcurrencyLimitRequest) returns (DeleteQueueConcurrencyLimitResponse) {}
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse) {}
  rpc CancelTask(CancelTaskRequest) returns (CancelTaskResponse) {}
  rpc DeleteTask(DeleteTaskRequest) returns (DeleteTaskResponse) {}
  rpc RunTask(RunTaskRequest) returns (RunTaskResponse) {}
  // RescheduleTask moves a waiting (scheduled, pending, or retry) task's due
  // time to a new instant.
  rpc RescheduleTask(RescheduleTaskRequest) returns (RescheduleTaskResponse) {}
  // ArchiveTask dead-letters a waiting (scheduled, pending, or retry) task.
  rpc ArchiveTask(ArchiveTaskRequest) returns (ArchiveTaskResponse) {}
  // BatchDeleteTasks deletes each listed task, reporting per-id outcomes.
  rpc BatchDeleteTasks(BatchTasksRequest) returns (BatchTasksResponse) {}
  // BatchRunTasks makes each listed task due immediately.
  rpc BatchRunTasks(BatchTasksRequest) returns (BatchTasksResponse) {}
  // BatchCancelTasks cancels each listed task.
  rpc BatchCancelTasks(BatchTasksRequest) returns (BatchTasksResponse) {}
  // BatchArchiveTasks dead-letters each listed task.
  rpc BatchArchiveTasks(BatchTasksRequest) returns (BatchTasksResponse) {}
  rpc ListCron(ListCronRequest) returns (ListCronResponse) {}
  rpc UpsertCron(UpsertCronRequest) returns (UpsertCronResponse) {}
  rpc PauseCron(PauseCronRequest) returns (PauseCronResponse) {}
  rpc ResumeCron(ResumeCronRequest) returns (ResumeCronResponse) {}
  rpc DeleteCron(DeleteCronRequest) returns (DeleteCronResponse) {}
  rpc ClusterInfo(ClusterInfoRequest) returns (ClusterInfoResponse) {}
  // ListWorkerSessions lists the worker sessions connected to the node serving
  // the request, for the operations dashboard's worker-topology view.
  rpc ListWorkerSessions(ListWorkerSessionsRequest) returns (ListWorkerSessionsResponse) {}
  // BrokerInfo reports the storage engine's driver and runtime statistics,
  // the analogue of a backing-store health page.
  rpc BrokerInfo(BrokerInfoRequest) returns (BrokerInfoResponse) {}
  // WatchEvents streams task lifecycle transitions as they occur, replacing
  // polling for live dashboards, alerting, audit logs, and event-driven
  // chaining. Delivery is best-effort and non-durable: a watcher receives
  // events from the moment it subscribes, and a watcher too slow to keep up
  // has events dropped rather than stalling task processing. The optional
  // queue and event-type filters narrow the stream server-side.
  rpc WatchEvents(WatchEventsRequest) returns (stream TaskEvent) {}
}

// ---- TaskService messages ----

// EnqueueRequest mirrors the SDK enqueue options. Zero values select the
// server defaults where one exists; the affected fields document this.
message EnqueueRequest {
  // task_id is an optional client-assigned ULID for idempotent retries.
  string task_id = 1;
  // queue routes the task; empty selects the "default" queue.
  string queue = 2;
  // type is the handler routing key; required.
  string type = 3;
  bytes payload = 4;
  string content_type = 5;
  map<string, string> metadata = 6;
  // max_retry is the retry budget; 0 selects the server default (25).
  // A task that must never retry returns SKIP_RETRY from its handler.
  int32 max_retry = 7;
  google.protobuf.Duration timeout = 8;
  google.protobuf.Timestamp deadline = 9;
  // process_at and process_in are mutually exclusive delay forms.
  google.protobuf.Timestamp process_at = 10;
  google.protobuf.Duration process_in = 11;
  string unique_key = 12;
  google.protobuf.Duration unique_ttl = 13;
  // priority orders dispatch within a queue; 0 selects the default (4),
  // explicit priorities are 1 (lowest) to 9 (highest).
  int32 priority = 14;
  google.protobuf.Duration retention = 15;
  // group, when set, makes the task a member of the named aggregation group
  // within its queue: members accumulate and are delivered to a worker as one
  // batch when the group fires. Mutually exclusive with process_at/process_in.
  string group = 16;
  // expires_in and expires_at are mutually exclusive forms of a pre-dispatch
  // TTL: a task not yet dispatched when its expiry passes is archived instead
  // of run. expires_in is relative to enqueue time; the server resolves it to
  // the absolute expires_at it stores. This is distinct from deadline (which
  // cancels a running task) and retention (which purges a completed one).
  google.protobuf.Duration expires_in = 17;
  google.protobuf.Timestamp expires_at = 18;
  // depends_on lists the tasks this task waits for. The task stays blocked and
  // is not eligible to lease until every dependency reaches a terminal success;
  // each dependency carries the policy applied if it instead fails terminally.
  repeated TaskDependency depends_on = 19;
  // concurrency_key caps how many tasks sharing it the queue runs at once, up to
  // the queue's configured concurrency limit. Mutually exclusive with group.
  string concurrency_key = 20;
  // retry_policy overrides the server's default retry backoff for this task;
  // unset uses the server default.
  RetryPolicy retry_policy = 21;
}

message EnqueueResponse {
  TaskInfo task = 1;
}

message EnqueueBatchRequest {
  repeated EnqueueRequest tasks = 1;
}

message EnqueueBatchResponse {
  repeated EnqueueResult results = 1;
}

// EnqueueResult reports the outcome of one item in a batch enqueue.
message EnqueueResult {
  TaskInfo task = 1;
  // error is non-empty when this item failed (e.g. duplicate task).
  string error = 2;
}

message GetTaskRequest {
  string id = 1;
}

message GetTaskResponse {
  TaskInfo task = 1;
}

// TaskInfo is the externally visible view of a task.
message TaskInfo {
  string id = 1;
  string queue = 2;
  string type = 3;
  TaskState state = 4;
  int32 priority = 5;
  int32 retried = 6;
  int32 max_retry = 7;
  string last_error = 8;
  google.protobuf.Timestamp enqueued_at = 9;
  google.protobuf.Timestamp process_at = 10;
  google.protobuf.Timestamp completed_at = 11;
  // payload is the opaque task payload, surfaced for inspection in the
  // dashboard. SDK codecs own the encoding described by content_type.
  bytes payload = 12;
  // content_type describes the payload encoding, e.g. "application/json".
  string content_type = 13;
  // started_at is when the most recent execution attempt began (lease time).
  // Unset for tasks that have never been dispatched.
  google.protobuf.Timestamp started_at = 14;
  // progress is the latest completion estimate (0 to 100) reported by the
  // running worker. Zero for tasks that have reported none.
  uint32 progress = 15;
  // progress_message is the latest human-readable status reported alongside
  // progress. Empty when none was reported.
  string progress_message = 16;
}

// ---- WorkerService frames ----

// WorkerMessage is every frame a worker may send on its session stream.
message WorkerMessage {
  oneof frame {
    Hello hello = 1;
    Credit credit = 2;
    Result result = 3;
    Heartbeat heartbeat = 4;
    BatchResult batch_result = 5;
    Progress progress = 6;
  }
}

// ServerMessage is every frame the server may send on a session stream.
message ServerMessage {
  oneof frame {
    Welcome welcome = 1;
    Dispatch dispatch = 2;
    Cancel cancel = 3;
    Ping ping = 4;
    BatchDispatch batch_dispatch = 5;
  }
}

// Hello opens a session: queue weights, total concurrency, and identity.
message Hello {
  // queues maps queue name to weight for weighted dispatch.
  map<string, int32> queues = 1;
  int32 concurrency = 2;
  map<string, string> labels = 3;
  string sdk_version = 4;
  // min_server_version is the minimum conveyord version this worker requires,
  // as a semver string (e.g. "v1.2.0"). Empty means no requirement; a
  // non-semver value disables the check. The server rejects the session when
  // its own version is older than this.
  string min_server_version = 5;
  // batch_types lists the task types this worker handles as batches (one
  // handler call per fired aggregation group). The server delivers a group's
  // members as a single BatchDispatch only to a worker that advertised the
  // group's type here; workers that advertise none never receive a batch.
  repeated string batch_types = 6;
}

// Credit optionally grants n additional dispatch slots beyond the worker's
// declared Hello.concurrency. It is NOT required: the server seeds dispatch
// credits equal to Hello.concurrency and refills one per Result, so a worker
// that simply answers every Dispatch with a Result needs no Credit frame.
// When sent, n must be in 1..concurrency; the server caps total credits at the
// declared concurrency.
message Credit {
  int32 n = 1;
}

// TaskOutcome is the worker-reported result of one execution attempt.
enum TaskOutcome {
  TASK_OUTCOME_UNSPECIFIED = 0;
  // TASK_OUTCOME_SUCCESS acknowledges the task as completed.
  TASK_OUTCOME_SUCCESS = 1;
  // TASK_OUTCOME_RETRY requests a retry; the server computes backoff.
  TASK_OUTCOME_RETRY = 2;
  // TASK_OUTCOME_SKIP_RETRY archives the task immediately.
  TASK_OUTCOME_SKIP_RETRY = 3;
  // TASK_OUTCOME_RELEASED re-queues without a retry increment
  // (graceful shutdown).
  TASK_OUTCOME_RELEASED = 4;
}

// Result reports the outcome of one dispatched task.
message Result {
  string task_id = 1;
  TaskOutcome outcome = 2;
  string error_msg = 3;
  bytes result = 4;
}

// Heartbeat lists the task ids still executing so their leases extend.
message Heartbeat {
  repeated string active_task_ids = 1;
}

// Progress reports how far a running task has advanced, for inspection while it
// executes. It is advisory: the server records the latest value and never gates
// execution on it, and a dropped Progress frame only loses a stale update.
message Progress {
  // task_id is the dispatched task the progress applies to.
  string task_id = 1;
  // percent is the completion estimate, 0 to 100. Values above 100 are clamped.
  uint32 percent = 2;
  // message is an optional human-readable status, e.g. "dumped 11/54 tables".
  string message = 3;
}

// Welcome acknowledges Hello and carries session parameters.
message Welcome {
  string session_id = 1;
  google.protobuf.Duration lease_ttl = 2;
  google.protobuf.Duration heartbeat_interval = 3;
  // server_version is the conveyord build serving this session, as a semver
  // string (or a non-semver dev marker). It lets a worker detect version skew.
  string server_version = 4;
  // min_sdk_version is the oldest worker SDK version this server admits, as a
  // semver string. A worker older than this is rejected at Hello; the value is
  // surfaced here so a worker can report the requirement clearly.
  string min_sdk_version = 5;
}

// Dispatch delivers one leased task to the worker.
message Dispatch {
  TaskEnvelope task = 1;
  // deadline is the effective execution deadline:
  // min(task deadline, lease expiry, task timeout).
  google.protobuf.Timestamp deadline = 2;
}

// BatchDispatch delivers one fired aggregation group to the worker as a single
// batch — all members run in one handler call. The members share one lease, so
// one BatchResult acknowledges the whole batch.
message BatchDispatch {
  // tasks are the group's members, all of the same type.
  repeated TaskEnvelope tasks = 1;
  // deadline is the effective execution deadline for the batch: the tightest
  // bound across members (min task deadline, lease expiry, task timeout).
  google.protobuf.Timestamp deadline = 2;
  // group is the aggregation group key the batch was fired from.
  string group = 3;
}

// BatchResult reports the per-member outcome of one dispatched batch. A member
// omitted from results is treated as RELEASED (redelivered, no retry penalty),
// the same safety net as a dropped single Result.
message BatchResult {
  repeated Result results = 1;
}

// Cancel asks the worker to cancel a running task (best effort).
message Cancel {
  string task_id = 1;
}

// Ping is a server liveness probe; workers need not reply.
message Ping {}

// ---- AdminService messages ----

message ListQueuesRequest {}

message ListQueuesResponse {
  repeated QueueInfo queues = 1;
}

// QueueInfo reports per-queue state counts and pause status.
message QueueInfo {
  string name = 1;
  bool paused = 2;
  int64 scheduled = 3;
  int64 pending = 4;
  int64 active = 5;
  int64 retry = 6;
  int64 completed = 7;
  int64 archived = 8;
  // aggregating counts group members accumulating before their group fires.
  int64 aggregating = 9;
  // blocked counts tasks held until their dependencies reach terminal success.
  int64 blocked = 10;
}

message PauseQueueRequest {
  string queue = 1;
}

message PauseQueueResponse {}

message ResumeQueueRequest {
  string queue = 1;
}

message ResumeQueueResponse {}

// RateLimitInfo reports one queue's dispatch-rate override.
message RateLimitInfo {
  // queue is the queue the override applies to.
  string queue = 1;
  // rate_per_sec is the sustained dispatch rate in tasks per second.
  double rate_per_sec = 2;
  // burst is the token-bucket depth.
  int32 burst = 3;
}

message ListRateLimitsRequest {}

message ListRateLimitsResponse {
  repeated RateLimitInfo limits = 1;
}

message SetQueueRateLimitRequest {
  // queue is the queue to limit.
  string queue = 1;
  // rate_per_sec is the sustained dispatch rate in tasks per second; must be
  // greater than zero.
  double rate_per_sec = 2;
  // burst is the token-bucket depth; must be at least one.
  int32 burst = 3;
}

message SetQueueRateLimitResponse {}

message DeleteQueueRateLimitRequest {
  // queue is the queue whose override to clear; clearing an absent override
  // succeeds.
  string queue = 1;
}

message DeleteQueueRateLimitResponse {}

// ConcurrencyLimitInfo reports one queue's per-key concurrency limit.
message ConcurrencyLimitInfo {
  // queue is the queue the limit applies to.
  string queue = 1;
  // max_active is the most tasks sharing a concurrency key the queue runs at once.
  int32 max_active = 2;
}

message ListConcurrencyLimitsRequest {}

message ListConcurrencyLimitsResponse {
  repeated ConcurrencyLimitInfo limits = 1;
}

message SetQueueConcurrencyLimitRequest {
  // queue is the queue to limit.
  string queue = 1;
  // max_active is the most tasks sharing a concurrency key that may be active at
  // once; must be at least one.
  int32 max_active = 2;
}

message SetQueueConcurrencyLimitResponse {}

message DeleteQueueConcurrencyLimitRequest {
  // queue is the queue whose limit to clear; clearing an absent limit succeeds.
  string queue = 1;
}

message DeleteQueueConcurrencyLimitResponse {}

message ListTasksRequest {
  string queue = 1;
  TaskState state = 2;
  int32 limit = 3;
  string page_token = 4;
}

message ListTasksResponse {
  repeated TaskInfo tasks = 1;
  string next_page_token = 2;
}

message CancelTaskRequest {
  string id = 1;
}

message CancelTaskResponse {}

message DeleteTaskRequest {
  string id = 1;
}

message DeleteTaskResponse {}

message RunTaskRequest {
  string id = 1;
}

message RunTaskResponse {}

// RescheduleTaskRequest moves a waiting task's due time.
message RescheduleTaskRequest {
  // id identifies the task to reschedule.
  string id = 1;

  // process_at and process_in are mutually exclusive forms of the new due time;
  // exactly one must be set. A future time leaves the task scheduled, while a
  // past or present time makes it due immediately.
  google.protobuf.Timestamp process_at = 2;
  google.protobuf.Duration process_in = 3;
}

message RescheduleTaskResponse {}

message ArchiveTaskRequest {
  string id = 1;
}

message ArchiveTaskResponse {}

// BatchTasksRequest carries the task ids a batch operation applies to.
message BatchTasksRequest {
  repeated string ids = 1;
}

// BatchTasksResponse reports the per-id outcome of a batch operation, in the
// same order as the request.
message BatchTasksResponse {
  repeated TaskActionResult results = 1;
}

// TaskActionResult is the outcome of one task in a batch operation.
message TaskActionResult {
  string id = 1;
  // error is empty on success, otherwise the failure reason for this id.
  string error = 2;
}

message ListCronRequest {}

message ListCronResponse {
  repeated CronEntry entries = 1;
}

// CronEntry is a persisted cron schedule that materializes tasks.
message CronEntry {
  string id = 1;
  // spec is a 6-field cron expression (go-quartz format).
  string spec = 2;
  string task_type = 3;
  string queue = 4;
  bytes payload = 5;
  string content_type = 6;
  TaskOptions options = 7;
  bool paused = 8;
  // next_run_at is when the scheduler will next materialize a task from this
  // entry. Unset until the scheduler has armed the entry from its spec.
  google.protobuf.Timestamp next_run_at = 9;
}

message UpsertCronRequest {
  CronEntry entry = 1;
}

message UpsertCronResponse {}

message PauseCronRequest {
  string id = 1;
}

message PauseCronResponse {}

message ResumeCronRequest {
  string id = 1;
}

message ResumeCronResponse {}

message DeleteCronRequest {
  string id = 1;
}

message DeleteCronResponse {}

message ClusterInfoRequest {}

message ClusterInfoResponse {
  repeated NodeInfo nodes = 1;
}

// NodeInfo describes one conveyord node (debugging aid).
message NodeInfo {
  string address = 1;
  google.protobuf.Timestamp started_at = 2;
}

message ListWorkerSessionsRequest {}

message ListWorkerSessionsResponse {
  repeated WorkerSession sessions = 1;
}

// WorkerSession describes one connected worker process: the queues it serves,
// its declared concurrency, its SDK version, and when it connected.
message WorkerSession {
  string id = 1;
  repeated string queues = 2;
  int32 concurrency = 3;
  string sdk_version = 4;
  google.protobuf.Timestamp connected_at = 5;
}

message BrokerInfoRequest {}

// BrokerInfoResponse reports the storage engine backing the broker.
message BrokerInfoResponse {
  // driver names the storage engine, e.g. "memory" or "postgres".
  string driver = 1;
  // metrics carries freeform engine statistics (connection pool counters,
  // row counts, server version) as display-ready key/value strings.
  map<string, string> metrics = 2;
}

// WatchEventsRequest subscribes to the task lifecycle event stream, optionally
// narrowed by queue and event type. Both filters are server-side and additive
// within a field (any listed value matches); an empty list places no constraint.
message WatchEventsRequest {
  // queues restricts the stream to these queues; empty means every queue.
  repeated string queues = 1;
  // event_types restricts the stream to these transitions; empty means every
  // transition.
  repeated TaskEventType event_types = 2;
}
