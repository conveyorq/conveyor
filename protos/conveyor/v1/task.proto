syntax = "proto3";

package conveyor.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

// TaskState enumerates the lifecycle states of a task.
//
// The numeric values are stable and mirror the broker storage encoding;
// they must never be renumbered.
enum TaskState {
  TASK_STATE_UNSPECIFIED = 0;
  // TASK_STATE_SCHEDULED is a task whose process_at lies in the future.
  TASK_STATE_SCHEDULED = 1;
  // TASK_STATE_PENDING is a task that is due and waiting for a lease.
  TASK_STATE_PENDING = 2;
  // TASK_STATE_ACTIVE is a task currently leased to a worker.
  TASK_STATE_ACTIVE = 3;
  // TASK_STATE_RETRY is a failed task waiting for its backoff to elapse.
  TASK_STATE_RETRY = 4;
  // TASK_STATE_COMPLETED is a successfully executed task retained until purge.
  TASK_STATE_COMPLETED = 5;
  // TASK_STATE_ARCHIVED is a dead-lettered task (retries exhausted or skipped).
  TASK_STATE_ARCHIVED = 6;
  // TASK_STATE_CANCELED is a task canceled via the Admin API before completion.
  TASK_STATE_CANCELED = 7;
  // TASK_STATE_AGGREGATING is a group member accumulating in the broker until
  // its group fires (by size, delay, or grace period), at which point the
  // group's members are leased together and delivered to a worker as one batch.
  TASK_STATE_AGGREGATING = 8;
  // TASK_STATE_BLOCKED is a task held until every task it depends on reaches a
  // terminal success. It is not eligible to lease while blocked; completing the
  // last dependency promotes it to pending (or scheduled, if it is also delayed).
  TASK_STATE_BLOCKED = 9;
}

// TaskEventType labels a task lifecycle transition emitted on the event stream.
// It is the transition that occurred; the resulting TaskState rides alongside it
// on the TaskEvent, so a watcher can filter on either the action or the state.
enum TaskEventType {
  TASK_EVENT_TYPE_UNSPECIFIED = 0;
  // TASK_EVENT_TYPE_ENQUEUED is a task newly committed and due (or made due
  // again: a promoted scheduled/blocked task that is now runnable).
  TASK_EVENT_TYPE_ENQUEUED = 1;
  // TASK_EVENT_TYPE_SCHEDULED is a task committed with a future process_at.
  TASK_EVENT_TYPE_SCHEDULED = 2;
  // TASK_EVENT_TYPE_LEASED is a task leased to a worker (now active).
  TASK_EVENT_TYPE_LEASED = 3;
  // TASK_EVENT_TYPE_COMPLETED is a task that executed successfully.
  TASK_EVENT_TYPE_COMPLETED = 4;
  // TASK_EVENT_TYPE_RETRIED is a failed attempt scheduled for a later retry.
  TASK_EVENT_TYPE_RETRIED = 5;
  // TASK_EVENT_TYPE_ARCHIVED is a dead-lettered task (retries exhausted, skipped,
  // expired before dispatch, or canceled mid-execution).
  TASK_EVENT_TYPE_ARCHIVED = 6;
  // TASK_EVENT_TYPE_CANCELED is a waiting task canceled via the Admin API or by a
  // failed dependency's cascade-cancel policy.
  TASK_EVENT_TYPE_CANCELED = 7;
  // TASK_EVENT_TYPE_RELEASED is an active task returned to pending without a retry
  // penalty (graceful worker disconnect).
  TASK_EVENT_TYPE_RELEASED = 8;
}

// TaskEvent is one task lifecycle transition delivered on the AdminService
// WatchEvents stream and the optional webhook sink. It is a lightweight
// notification: it carries the task's identity and new state, not its payload.
// Delivery is best-effort and non-durable (fire-and-forget, at-least-once to
// connected listeners); a slow watcher's missed events are dropped, never
// buffered without bound.
message TaskEvent {
  // id is the task ULID the transition applies to.
  string id = 1;
  // queue is the task's queue.
  string queue = 2;
  // type is the handler routing key, e.g. "email:welcome".
  string type = 3;
  // state is the task's lifecycle state after the transition.
  TaskState state = 4;
  // event_type is the transition that occurred.
  TaskEventType event_type = 5;
  // occurred_at is when the transition was recorded, from the server clock.
  google.protobuf.Timestamp occurred_at = 6;
  // attempt is the task's retry count after the transition.
  int32 attempt = 7;
  // last_error is the most recent failure message, set on retried and archived
  // transitions and empty otherwise.
  string last_error = 8;
}

// DependencyFailurePolicy decides what happens to a dependent task when one of
// the tasks it depends on fails terminally (archived or canceled).
enum DependencyFailurePolicy {
  // DEPENDENCY_FAILURE_POLICY_UNSPECIFIED defaults to BLOCK.
  DEPENDENCY_FAILURE_POLICY_UNSPECIFIED = 0;
  // DEPENDENCY_FAILURE_POLICY_BLOCK keeps the dependent blocked indefinitely:
  // the dependency never succeeded, so the dependent never becomes eligible.
  DEPENDENCY_FAILURE_POLICY_BLOCK = 1;
  // DEPENDENCY_FAILURE_POLICY_CASCADE_CANCEL cancels the dependent (and, in
  // turn, its own dependents) when the dependency fails.
  DEPENDENCY_FAILURE_POLICY_CASCADE_CANCEL = 2;
  // DEPENDENCY_FAILURE_POLICY_CONTINUE treats the failed dependency as
  // satisfied, so the dependent proceeds once its remaining dependencies clear.
  DEPENDENCY_FAILURE_POLICY_CONTINUE = 3;
}

// TaskDependency is one edge of a workflow: the enclosing task must wait for the
// referenced task to reach a terminal state before it becomes eligible to run.
message TaskDependency {
  // task_id is the id of the task that must finish first.
  string task_id = 1;
  // on_failure decides the dependent's fate if this dependency fails terminally.
  DependencyFailurePolicy on_failure = 2;
}

// TaskEnvelope is the internal, durable representation of a task.
//
// The payload is opaque bytes plus a content type; user-visible protobuf is
// forbidden by design. The envelope is what brokers persist and what actor
// messages reference.
message TaskEnvelope {
  // id is the task ULID. Client-assignable; Enqueue is idempotent on it.
  string id = 1;
  // queue is the named queue the task belongs to.
  string queue = 2;
  // type is the handler routing key, e.g. "email:welcome".
  string type = 3;
  // payload is opaque; SDK codecs own the encoding.
  bytes payload = 4;
  // content_type describes the payload encoding, e.g. "application/json".
  string content_type = 5;
  // metadata carries user tags and trace propagation (e.g. traceparent).
  map<string, string> metadata = 6;
  // options are the execution options captured at enqueue time.
  TaskOptions options = 7;
  // retried is the number of times the task has been retried so far.
  int32 retried = 8;
  // last_error is the message of the most recent failure, if any.
  string last_error = 9;
  // enqueued_at is when the task was first committed to the broker.
  google.protobuf.Timestamp enqueued_at = 10;
  // started_at is when the most recent execution attempt was leased to a
  // worker. It is an overlay field: brokers stamp it on reads from the
  // authoritative lease timestamp, never persist it inside the payload.
  google.protobuf.Timestamp started_at = 11;
  // completed_at is when the task reached its most recent terminal state
  // (completed, archived, or canceled). It is an overlay field, stamped on
  // reads from the authoritative column. Unset while the task is not terminal.
  google.protobuf.Timestamp completed_at = 12;
}

// TaskOptions captures the per-task execution options.
message TaskOptions {
  // max_retry is the number of retries before archiving. Default 25.
  int32 max_retry = 1;
  // timeout bounds a single execution attempt.
  google.protobuf.Duration timeout = 2;
  // deadline is the absolute time after which the task must not run.
  google.protobuf.Timestamp deadline = 3;
  // process_at delays execution until the given time.
  google.protobuf.Timestamp process_at = 4;
  // unique_key enforces uniqueness among incomplete tasks.
  string unique_key = 5;
  // unique_ttl bounds how long the uniqueness claim is held.
  google.protobuf.Duration unique_ttl = 6;
  // retention keeps the completed task row for inspection before purge.
  google.protobuf.Duration retention = 7;
  // priority orders dispatch within a queue, 0..9. Default 4.
  int32 priority = 8;

  // group, when set, makes the task a member of the named aggregation group
  // within its queue. Members accumulate in the aggregating state and are
  // delivered to a worker as one batch when the group fires. A group is
  // single-type: every member shares the task's type.
  string group = 9;

  // expires_at is the absolute time after which the task must not be
  // dispatched: a task still waiting (scheduled, pending, or retrying) when
  // this passes is archived instead of run. It is distinct from deadline,
  // which cancels a task already running, and from retention, which purges a
  // task already completed. Unset leaves the task with no expiry. The server
  // resolves the relative EnqueueRequest.expires_in to this absolute time.
  google.protobuf.Timestamp expires_at = 10;

  // depends_on lists the tasks this task waits for. While any dependency has
  // not reached a terminal success the task stays blocked and is not eligible
  // to lease. An empty list (the default) leaves the task immediately eligible.
  // Fan-in is a continuation that depends on every task of a fan-out batch.
  repeated TaskDependency depends_on = 11;

  // concurrency_key caps how many tasks sharing it run at once: the queue
  // dispatches at most its configured concurrency limit of tasks with this key
  // simultaneously, holding the rest pending until an active one finishes. Empty
  // (the default) leaves the task unbounded. It is distinct from unique_key,
  // which forbids a duplicate outright. Mutually exclusive with group, which is
  // dispatched as a batch on a separate path.
  string concurrency_key = 12;

  // Reserved for future options.
  reserved 13 to 15;
}
