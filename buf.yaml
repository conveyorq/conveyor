version: v2
modules:
  - path: protos
lint:
  use:
    - STANDARD
  except:
    # The worker session stream uses domain frame names (WorkerMessage /
    # ServerMessage) as part of the public contract.
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
breaking:
  use:
    - WIRE_JSON
  except:
    # Reserved field ranges in these protos are forward-reservations for planned
    # features (e.g. TaskOptions 9-15, "for groups, rate limits"), never
    # tombstones of deleted fields. Consuming a reserved number is the intended
    # workflow and is wire-safe — the number was never on the wire — so shrinking
    # a reserved range to claim a field must not count as a breaking change.
    - RESERVED_MESSAGE_NO_DELETE
