version: v2
# Code is generated into the gen/ staging directory; `make proto` swaps it
# into internal/proto once generation has succeeded, so stale files are
# cleaned without ever touching anything else under internal/.
clean: true
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/conveyorq/conveyor/internal/proto
plugins:
  - local: protoc-gen-go
    out: gen
    opt: paths=source_relative
  - local: protoc-gen-connect-go
    out: gen
    opt: paths=source_relative
